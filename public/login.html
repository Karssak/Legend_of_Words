<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Login | LOW</title>
    <link rel="stylesheet" href="login_style.css">
    <link rel="icon" type="image/x-icon" href="/img/favicon.png">
  </head>
  <body>
    <div class="nav">
      <nav>
        <div class="site-header">
          <div class="site-name">
            <a href="/">Legend of Words</a>
          </div>
          <div class="categories">
            <a href="#" class="category-link">Map</a>
            <a href="#" class="category-link">Messages</a>
            <a href="/wip" class="category-link">Forum</a>
            <a href="#" class="category-link">Encyclopedia</a>
            <a href="/wip" class="category-link">Updates</a>
          </div>
        </div>
      </nav>
    </div>
    <div class="container">
      <form class="register-form" id="loginForm" method="post">
        <div>
          <h1>Login</h1>
          <h3>Enter your credentials to access your account</h3>
          <div class="input-field">
            <label for="email">Email:</label>
            <input type="email" name="email" required>
          </div>
          <div class="input-field">
            <label for="password">Password:</label>
            <div class="password-input-container">
              <input type="password" id="password" name="password" required>
              <img src="img/eye.png" alt="Show Password" class="password-toggle" onclick="togglePasswordVisibility()">
            </div>
          </div>
          <a href="/wip" class="forgor">I forgot my password</a>
          <div class="center">
            <button type="submit">Login</button>
          </div>
        </div>
      </form>
      <h4 class="orlogin">Don’t have an account? <a href="registration.html">Sign up</a>
      </h4>
    </div>
    <div class="custom-alert">
      <span class="close-btn">&times;</span>
      <p id="errorPopup"></p>
    </div>
    <script src="login_script.js"></script>
  </body>
</html>

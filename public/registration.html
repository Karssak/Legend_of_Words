<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Registration | LOW</title>
    <link rel="stylesheet" href="registration_style.css">
    <link rel="icon" type="image/x-icon" href="/img/favicon.png">
    <style>
      .custom-alert {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 20px;
        background-color: #fff;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        border: 3px solid #ff6666;
        text-align: center;
      }

      .close-btn {
        position: absolute;
        top: 5px;
        right: 5px;
        cursor: pointer;
        font-size: 18px;
        color: #ff6666;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <nav>
        <div class="site-header">
          <div class="site-name">
            <a href="/">Legend of Words</a>
          </div>
          <div class="categories">
            <a href="#" class="category-link">Map</a>
            <a href="#" class="category-link">Messages</a>
            <a href="/wip" class="category-link">Forum</a>
            <a href="#" class="category-link">Encyclopedia</a>
            <a href="/wip" class="category-link">Updates</a>
          </div>
        </div>
      </nav>
    </div>
    <div class="container">
      <form class="register-form" id="registerForm" action="/register" method="post">
        <div>
          <h1>Register</h1>
          <h3>Create your LOW account by filling in the details below</h3>
          <div class="input-field">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
          </div>
          <div class="input-field">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="input-field">
            <label for="password">Password:</label>
            <div class="password-input-container">
              <input type="password" id="password" name="password" required>
              <img src="img/eye.png" alt="Show Password" class="password-toggle" onclick="togglePasswordVisibility('password')">
            </div>
          </div>
          <div class="input-field">
            <label for="confirmPassword">Confirm Password:</label>
            <div class="password-input-container">
              <input type="password" id="confirmPassword" name="confirmPassword" required>
              <img src="img/eye.png" alt="Show Password" class="password-toggle" onclick="togglePasswordVisibility('confirmPassword')">
            </div>
          </div>
          <div class="center">
            <button type="button" onclick="validateAndSubmit()">Register</button>
          </div>
        </div>
      </form>
      <h4 class="orlogin">Already have an account? <a href="login.html">Log in</a>
      </h4>
    </div>
    <div id="passwordAlert" class="custom-alert">
      <span class="close-btn" onclick="closeCustomAlert()">&times;</span>
      <p id="alertMessage"></p>
    </div>
    <script src="registration_script.js"></script>
  </body>
</html>
